name: Bank Monitor Agent

# Запуск: ежедневно в 09:00 МСК (06:00 UTC)
# Также можно запустить вручную через интерфейс GitHub
on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 МСК ежедневно
  workflow_dispatch:       # ручной запуск кнопкой

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      # Восстанавливаем historty.json из artifact прошлого запуска
      - name: Download history from previous run
        uses: actions/download-artifact@v4
        with:
          name: bank-history
          path: .
        continue-on-error: true   # первый запуск — артефакта ещё нет

      - name: Run bank monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bank_monitor_production.py

      # Сохраняем history.json для следующего запуска
      - name: Save history for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bank-history
          path: history.json
          retention-days: 90
          overwrite: true

      # Сохраняем лог как artifact (для отладки)
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log-${{ github.run_id }}
          path: bank_monitor.log
          retention-days: 14
